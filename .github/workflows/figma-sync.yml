name: Sync Figma to GitHub

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate UI
        run: |
          mkdir -p src/generated

          cat > src/generated/App.tsx << 'EOF'
          export default function App() {
            return (
              <div>
                UI gerada automaticamente do Figma
              </div>
            )
          }
          EOF

      - name: Commit files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add .

          git commit -m "Figma sync" || echo "No changes"

          git push
